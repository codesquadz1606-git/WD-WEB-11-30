<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form>
        <label for="fname">First Name :</label>
        <input type="text" id="fname" placeholder="Enter First Name">
        <br>
        <label for="">Last Name :</label>
        <input type="text" placeholder="Enter Last Name">
        <br>
        <label for="">Email :</label>
        <input type="email">
        <br>
        <label for="">Phone No:</label>
        <input type="number">
        <br>
        <label for="">Password :</label>
        <input type="password">
        <br>
        <label for="">Gender :</label>
        <!-- Here the name must contain same value -->
        <input type="radio" name="gender"> Male
        <input type="radio" name="gender"> Female
        <br>
        <label for="">Hobbies :</label>
        <input type="checkbox">Reading
        <input type="checkbox">Writing
        <br>
        <label for="">Select Education :</label>
        <select name="" id="">
            <option value="">--Select any one--</option>
            <option value="">10th Pass</option>
            <option value="">12th Pass</option>
            <option value="">Graduated</option>
            <option value="">Post Graduate</option>
        </select>
        <br>
        <label for="">Share Your Feedback :</label>
        <textarea name="" id=""></textarea>
        <br>
        <label for="">Date of Birth :</label>
        <input type="date">
        <br>
        <label for="">Upload Docs :</label>
        <input type="file">
        <br>
        <input type="submit" value="Save">
        <input type="reset" value="Clear">
    </form>
</body>
</html>

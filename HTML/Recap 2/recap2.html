<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table & Form Tag</title>
</head>
<body>
    <!-- 
        What is Table?
        Table is a combination of rows & columns.
        Where row is denoted by tr
        & Column is denoted by td(table data/th(table head)

        The space b/w outer cell & inner cell : cellspacing
        the space b/w cell & content : cellpadding
    -->

    <table border="1" cellspacing="0" cellpadding="10">
        <tr>
            <th>Name</th>
            <th>City</th>
            <th>Age</th>
        </tr>
        <tr>
            <td>Hitesh</td>
            <td>Mumbai</td>
            <td>21</td>
        </tr>
        <tr>
            <td>Nitin</td>
            <td>Banglore</td>
            <td>25</td>
        </tr>
        <tr>
            <td>Lalit</td>
            <td>Delhi</td>
            <td>22</td>
        </tr>
    </table>

    <!-- 
        Row merge (vertically) : rowspan
        Column merge (horizontally) : colspan
    -->

    <table border="1" cellpadding="10">
        <tr>
            <td colspan="2">Cell 1</td>
            <td>Cell 2</td>
            <td>Cell 3</td>
        </tr>
        <tr>
            <td rowspan="3">Cell 4</td>
            <td>Cell 5</td>
            <td>Cell 6</td>
            <td>Cell 7</td>
        </tr>
        <tr>
            <td colspan="3">Cell 8</td>
        </tr>
        <tr>
            <td>Cell 9</td>
            <td colspan="2">Cell 10</td>
        </tr>
    </table>

    <hr>

    <table border="1" cellpadding="20">
        <tr>
            <td></td>
            <td></td>
            <td rowspan="2"></td>
            <td rowspan="3"></td>
        </tr>
        <tr>
            <td></td>
            <td></td>
        </tr>
        <tr>
            <td></td>
            <td rowspan="2" colspan="2"></td>
        </tr>
        <tr>
            <td rowspan="3"></td>
            <td></td>
        </tr>
        <tr>
            <td></td>
            <td></td>
            <td></td>
        </tr>
        <tr>
            <td colspan="3"></td>
        </tr>
        <tr>
            <td></td>
            <td></td>
            <td></td>
            <td></td>
        </tr>
    </table>

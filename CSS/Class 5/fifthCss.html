<style>
    .container{
        display: flex;
        justify-content: center;
        gap: 10px;
        flex-wrap: wrap;
    }

    .box{
        width: 240px;
        height: 400px;
        border: 10px solid black;
    }

    @media (max-width:545px) {
        .box{
            width:90%;
            border-radius: 40px;
        }

        .container{
            gap:30px
        }
    }

    .flex{
        display: flex;
        gap: 10px;
    }

    .flex-p{
        display: flex;
        justify-content: space-between;
    }

    @media (min-width:1030px) {
        .h-screen2{
            display: none;
        }
    }

    @media (max-width:1029px) {
        .h-screen1{
            display: none;
        }
    }
</style>
